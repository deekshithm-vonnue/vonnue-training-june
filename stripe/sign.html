    <main>
      <div class="sign-full-container">
        <div class="card-container">
          <div class="card">
            <div class="sign-form">
              <h1 class="headline">Sign in to your account</h1>
              <form>
                <div>
                  <div class="form-content">
                    <label for="email" class="text-content">Email</label>
                    <input
                      id="email"
                      name="email"
                      type="email"
                      class="input-box"
                    />
                    <div class="password-container">
                      <label for="password" class="text-content"
                        >Password</label
                      >
                      <span class="text-content" style="color: #635bff"
                        >Forgot your password?</span
                      >
                    </div>
                    <input
                      id="password"
                      name="password"
                      type="password"
                      class="input-box"
                    />
                    <div class="remember-container text-content">
                      <input
                        style="
                          width: 14px;
                          height: 14px;
                          border-radius: 4px;
                          opacity: 0.2;
                        "
                        type="checkbox"
                        id="reminder"
                        name="reminder"
                        style="
                          border-radius: 4px;
                          border: 1px solid rgba(146, 0, 231, 0);
                        "
                      />

                      <label
                        for="reminder"
                        style="
                          font-size: 14px;
                          color: #1a2c44;
                          font-weight: 400;
                          padding-left: 8px;
                        "
                        >Remember me on this device</label
                      >
                    </div>
                    <button class="sign-button"><span>Sign in</span></button>
                  </div>
                  <div class="text-content signinwith">

                  </div>
