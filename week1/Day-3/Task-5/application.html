<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Free Web tutorials" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Section Application Form</title>
  </head>
  <body>
    <header>
      <h1>Job Application Form</h1>
      <nav>
        <ol>
            <li aria-current="step">Step 1: Personal Information</li>
            <li>Step 2: Work Experience</li>
            <li> Step 3: Documents</li>
        </ol>
      </nav>
    </header>
    <main>
      <form>
        <fieldset>
          <legend>Step 1: Personal Information</legend>
          <label for="name">Name</label>
          <input type="text" id="name" required /><br /><br />
          <label for="email">Email</label>
          <input type="email" id="email" required /><br /><br />
          <label for="phone">Phone</label>
          <input
            type="tel"
            id="phone"
            pattern="[0-9]{10}"
            required
          /><br /><br />
          <label for="linkedin">Linkendin Profile</label>
          <input type="url" id="linkedin" name="profile" /><br /><br />
        </fieldset>
        <fieldset>
          <legend>Step 2: Work Experience</legend>
          <label for="current-role">Current Role</label>
          <input
            type="text"
            id="current-role"
            name="current-role"
          /><br /><br />
          <label for="current-company">Current company</label>
          <input
            type="text"
            id="current-company"
            name="current-company"
          /><br /><br />
          <label for="experience">Years Experience</label>
          <input type="number" id="experience" name="experience" /><br /><br />
          <label for="achivements">Key achivements</label><br />
          <textarea rows="10" cols="30" id="achivements" placeholder="Max 500 Characters"></textarea><br /><br />
        </fieldset>
        <fieldset>
          <legend>Step 3: Documents</legend>
          <label for="cv">Upload CV</label>
          <input type="file" id="cv" accept=".pdf,.docx" /><br /><br />
          <label for="coverletter">Cover letter upload</label>
          <input type="file" id="coverletter" accept=".pdf,.docx" /><br /><br />
          <label for="portfolio">Portfolio URL</label>
          <input type="url" id="portfolio" name="portfolio">
        </fieldset><br>
        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
