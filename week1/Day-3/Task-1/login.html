<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Free Web tutorials" />
    <meta name="viewpot" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
  </head>
  <body>
    <header>
      <h1>Login Form</h1>
      <hr />
    </header>
    <main>
      <form action="/action_page.php">
        <label for="email">Email</label>
        <input type="email" autocomplete="email" id="email" required /> <br />
        <br />

        <label for="password">Password</label>
        <input
          type="password"
          autocomplete="current-password"
          required
          aria-describedby="pwd-desc"
          id="password"
        />
        <button aria-pressed="false">Show/hide</button>
        <p id="pwd-desc">Paasword must contain at least 8 characters</p>

        <label for="remember-me">Remember-me</label>
        <input type="checkbox" id="remember-me" required /><br /><br />
        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
