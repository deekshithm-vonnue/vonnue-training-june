<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Free Web tutorials" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Native HTML5 Validation</title>
  </head>
  <body>
    <header>
      <h1>Validation</h1>
    </header>
    <main>
      <form>
        <label for="email">Email</label>
        <input type="email" id="email" required /><br /><br />
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
          minlength="8"
          required
        /><br /><br />
        <label for="age">Age</label>
        <input
          type="number"
          id="age"
          value="12"
          min="18"
          max="99"
        /><br /><br />
        <label for="linkedin">Linkendin Profile</label>
        <input type="url" id="linkedin" name="profile" /><br /><br />
        <label for="dob" >Date of birth</label>
        <input type="date" id="dob" value="2018-07-22" max="2026-06-09" required /> <br /><br />
        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
