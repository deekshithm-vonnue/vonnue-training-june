<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="descrption" content="Showing item Property" />
    <link rel="stylesheet" href="item.css" />
    <title>Every Item Property</title>
  </head>
  <body>
    <h1>Every Item Property</h1>

    <h2>flex grow</h2>
    <div class="container">
      <div class="item">1</div>
      <div class="item flex-grow-1">2</div>
      <div class="item flex-grow-2">3</div>
      <div class="item" flex-grow-1>4</div>
      <div class="item">5</div>
    </div>

    <h2>flow-shrink</h2>
    <div class="container container-width">
      <div class="item">1</div>
      <div class="item flex-shrink-2">2</div>
      <div class="item flex-shrink-3">3</div>
      <div class="item flex-shrink-2">4</div>
      <div class="item">5</div>
    </div>

    <h2>flow-basics</h2>
    <div class="container">
      <div class="item flex-basis-1">1</div>
      <div class="item flex-basis-2">2</div>
      <div class="item flex-basis-3">3</div>
      <div class="item flex-basis-4">4</div>
      <div class="item">5</div>
    </div>

    <h2>flex-order</h2>
    <div class="container">
      <div class="item order-1">1</div>
      <div class="item order-2">2</div>
      <div class="item order-3">3</div>
      <div class="item order-4">4</div>
      <div class="item order-5">5</div>
    </div>

    <h2>align-self</h2>
    <div class="container align-item-center">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item align-self-end">3</div>
      <div class="item">4</div>
      <div class="item">5</div>
    </div>
  </body>
</html>
