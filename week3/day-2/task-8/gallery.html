<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="gallery.css" />
    <script src="script.js" defer></script>
    <title>Gallery Image</title>
  </head>
  <body>
    <dialog>
    <div class="overlay">
      <button class="buttons" id="prev-button">⎗</button>
      <img class="overlay-img" />
      <button class="buttons" id="next-button">⎘</button>
    </div>
    </dialog>
    <div class="card">
      <h1>Gallery Image</h1>
      <figure>
        <img
          class="gallery-image"
          src="https://picsum.photos/seed/picsum/200/300"
        />
        <figcaption>Mountains</figcaption>
      </figure>
      <figure>
        <img class="gallery-image" src="https://picsum.photos/id/247/200/300" />
        <figcaption>Hills</figcaption>
      </figure>
      <figure>
        <img class="gallery-image" src="https://picsum.photos/id/217/200/300" />
        <figcaption>Lakes</figcaption>
      </figure>
      <figure>
        <img class="gallery-image" src="https://picsum.photos/id/227/200/300" />
        <figcaption>Railway track</figcaption>
      </figure>
      <figure>
        <img class="gallery-image" src="https://picsum.photos/id/297/200/300" />
        <figcaption>Factory</figcaption>
      </figure>
      <figure>
        <img class="gallery-image" src="https://picsum.photos/id/287/200/300" />
        <figcaption>trecking</figcaption>
      </figure>
    </div>
  </body>
</html>
